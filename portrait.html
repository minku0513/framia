<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Framia — 가로 사진 세로 3:4 자르기</title>
    <link rel="stylesheet" href="./portrait.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Framia 홈"><span class="brand-mark">F</span>Framia</a>
      <p>가로 사진을 이어지는 세로 게시물로</p>
    </header>

    <main class="workspace">
      <section class="editor-panel" aria-label="가로 사진 세로 자르기 도구">
        <div class="editor-heading"><p class="eyebrow">PORTRAIT SPLITTER</p><h1>가로 사진을<br />세로로 나누세요.</h1></div>
        <label class="upload-card" id="uploadCard" for="imageInput">
          <input id="imageInput" type="file" accept="image/*" />
          <span class="upload-icon" aria-hidden="true">＋</span>
          <strong>가로 사진 선택</strong>
          <span id="fileStatus">JPG, PNG, WebP</span>
        </label>

        <div id="splitControls" class="split-controls" hidden>
          <div class="control-heading"><div><p class="label">분할 장수</p><strong id="countLabel">3장의 게시물</strong></div></div>
          <input id="countRange" type="range" min="2" max="10" value="3" aria-label="분할할 게시물 수" />
          <div class="range-labels"><span>2장</span><span>10장</span></div>
        </div>
        <div id="cropControls" class="crop-controls" hidden>
          <div class="control-heading"><div><p class="label">크롭 위치</p><strong id="cropValue">가운데</strong></div><button id="resetCrop" class="text-button" type="button">가운데로</button></div>
          <input id="cropRange" type="range" min="0" max="100" value="50" aria-label="가로 사진 크롭 위치" />
          <div class="range-labels"><span>왼쪽</span><span>오른쪽</span></div>
        </div>
        <div id="downloadActions" class="download-actions" hidden>
          <div id="singleDownloads" class="single-downloads"></div>
          <button type="button" class="secondary" id="downloadAll">ZIP으로 저장</button>
        </div>
      </section>

      <section class="preview-panel" id="previewPanel" aria-label="인스타그램 게시물 미리보기" aria-live="polite">
        <div class="instagram-post">
          <div class="post-author" aria-hidden="true">
            <span class="author-avatar"></span><span class="author-name"></span><span class="more-icon">•••</span>
          </div>
          <div class="carousel" id="carousel">
            <div class="carousel-track" id="carouselTrack"></div>
            <button type="button" class="carousel-arrow previous" id="previousButton" aria-label="이전 사진">‹</button>
            <button type="button" class="carousel-arrow next" id="nextButton" aria-label="다음 사진">›</button>
            <div id="emptyState" class="empty-state"><b>게시물 미리보기</b><span>사진을 올려 시작하세요</span></div>
            <span id="pageCount" class="page-count" hidden>1/3</span>
          </div>
          <div class="carousel-dots" id="carouselDots" aria-label="사진 순서"></div>
          <div class="post-actions" aria-hidden="true">
            <img src="./assets/post-icons/heart.jpeg" alt="" />
            <img src="./assets/post-icons/comment.jpeg" alt="" />
            <img src="./assets/post-icons/repost.jpeg" alt="" />
            <img src="./assets/post-icons/share.jpeg" alt="" />
            <img class="bookmark" src="./assets/post-icons/bookmark.jpeg" alt="" />
          </div>
          <div class="post-copy" aria-hidden="true"><i class="copy-avatar"></i><i class="copy-line primary"></i><i class="copy-line short"></i><i class="copy-line wide"></i></div>
        </div>
      </section>
    </main>
    <script src="./portrait.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Framia — 사진 포맷 메이커</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <main class="home-shell">
      <header class="home-header">
        <a class="brand" href="./index.html" aria-label="Framia 홈"><span>F</span>Framia</a>
        <p>사진을 원하는 포맷으로</p>
      </header>

      <section class="hero">
        <p class="eyebrow">PHOTO FORMAT STUDIO</p>
          <h1><span class="hero-brand">Framia:</span><br />게시물을 더 쉽게</h1>
        <p class="intro">업로드한 사진을 인스타그램에 어울리는 비율과 구성으로 손쉽게 만드세요.</p>
      </section>

      <section class="tool-grid" aria-label="사진 편집 도구">
        <a class="tool-card active" href="./ratio.html">
          <div class="tool-visual ratio-visual"><span></span><span></span><span></span></div>
          <div class="tool-copy"><p class="card-label">READY</p><h2>게시물 비율 맞추기</h2><p>단색 배경 안에서 사진 크기와 게시물 비율을 조절합니다.</p></div>
          <span class="card-arrow" aria-hidden="true">↗</span>
        </a>

        <a class="tool-card active" href="./portrait.html">
          <div class="tool-visual portrait-visual"><span></span><span></span></div>
          <div class="tool-copy"><p class="card-label">READY</p><h2>가로 사진 세로 3:4 자르기</h2><p>가로 사진의 구도를 이어지는 세로 게시물로 변환합니다.</p></div>
          <span class="card-arrow" aria-hidden="true">↗</span>
        </a>

        <a class="tool-card active" href="./panorama.html">
          <div class="tool-visual panorama-visual"><span></span><span></span><span></span></div>
          <div class="tool-copy"><p class="card-label">READY</p><h2>파노라마 3분할</h2><p>이어지는 세 장의 세로 게시물로 나누고 바로 저장합니다.</p></div>
          <span class="card-arrow" aria-hidden="true">↗</span>
        </a>
      </section>
    </main>
  </body>
</html>
